<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/login_cadastro.css">
  <title>Login</title>
</head>
<body>
    <div class="left">
    <img src="eniac_img.png" href="eniac_img">

  <div class="container">
    <img src="eniac_img.png" alt="EcoHub" class="logo">

    <h1>Login</h1>

  <form>
    <input type="text" placeholder="E-mail" required>
    <input type="password" placeholder="Senha" required>

    <button type="submit">Entrar</button>
    <button type="button">Voltar</button>
  </form>

    <p class="troca-pagina">
      Não tem cadastro?
      <a href="cadastro.html">Cadastre-se</a>
    </p>
  </div>
    <div class="right">
        <div class="container">
        <h1>Login</h1>
            <form>
                <input type="text" placeholder="Nome ou e-mail" required>
                <input type="password" placeholder="senha" required>
                <button type="submit">Entrar</button>
                <button type="button">Voltar</button>
            </form>
            <p class="troca-pagina">Não tem cadastro?
            <a href="cadastro.html">Cadastre-se</a>
            </p>
        </div>
    </div>

</body>
</html>
