<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feed</title>
<link rel="stylesheet" href="feed.css">
</head>

<body>

<header>
  <nav>
    <h2>EcoHub</h2>
    <ul>
      <li>Início</li>
      <li>Feed</li>
      <li>Eventos</li>
      <li>Perfil</li>
    </ul>
  </nav>
</header>

<section class="feed-header">
  <h1>Feed</h1>
  <input type="text" placeholder="Buscar projetos, alunos ou tecnologias">
</section>

<section class="criar-post">
  <div class="foto"></div>
  <input type="text" placeholder="Compartilhe seu projeto ou conquista...">
  <button>Postar</button>
</section>

<section class="feed" id="feed">

  <p class="feed-vazio">
    Nenhuma postagem ainda.
  </p>

</section>

</body>
</html>
