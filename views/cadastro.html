<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/login_cadastro.css">

    <title>Cadastro</title>
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/img/logotitle.png">
</head>
<body>

    <div class="container">
        <img src="../assets/img/eco-certo.png" alt="EcoHub" class="logo">

        <h1>Login</h1>

        <form id="formCadastro">
            <input type="text" placeholder="Nome completo" required>
     <input type="email" placeholder="seu.email@eniac.edu.br" required>
            <div class="linha">
                <select id="curso" name="curso" required>
                    <option value="">curso</option>
                    <option value="eng_software">Eng. Software</option>
            <option value="ciencia_computacao">Ciência da Computação</option>
                    <option value="sistemas_info">Sistemas de Informação</option>
                    <option value="analise_dev">Análise e Desenvolvimento</option>
                    <option value="redes de computador">Redes de Computadores</option>
                    <option value="adiminstrador">Adiminstração</option>
                      <option value="enfermagem">Enfermagem</option>
                       <option value="mecatronica">Mecatronica</option>
                        <option value="segurança do trabalho">Segurança do trabalho</option>
                        <option value="programação em jogos digitais">Programação em jogos digitais</option>
                        <option value="redes de computador">Redes de computadores</option>
                         <option value="informatica para internet ">Informatica para internet</option> 
                </select>

                <select id="semestre" name="semestre" required>
                    <option value="">semestre</option>
              <option value="1">1º Semestre</option>
                    <option value="2">2º Semestre</option>
                    <option value="3">3º Semestre</option>
             <option value="4">4º Semestre</option>
                    <option value="5">5º Semestre</option>
                    <option value="6">6º Semestre</option>
                    <option value="7">7º Semestre</option>
                    <option value="8">8º Semestre</option>
                </select>
            </div>
           <div class="campo">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="senhaLogin" placeholder="Senha" required>
                <i class="fa-solid fa-eye toggle-senha" onclick="toggleSenha('senhaLogin',this)"></i>
        </div>
            <div class="lembrar">
                <input type="checkbox" id="lembrarLogin">
                <label for="lembrarLogin">Lembrar-me</label>
            </div>
            <button type="submit">Entrar</button>
            <a href="../views/inicio.html" class="btn-secundario">
            Voltar para página inicial
            </a>
        </form>

        <p class="troca-pagina">
            Não tem cadastro?
            <a href="cadastro.html">Cadastre-se</a>
        </p>
    </div>
    <script src="../js/cadastro.js" defer></script>
    
<script src="../js/inicio.js"></script>
</body>
</html>
